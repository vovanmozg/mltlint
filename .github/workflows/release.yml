name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          GOOS=linux  GOARCH=amd64 CGO_ENABLED=0 go build -o mltlint-linux-amd64  ./cmd/mltlint
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o mltlint-darwin-amd64 ./cmd/mltlint
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o mltlint-darwin-arm64 ./cmd/mltlint

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mltlint-linux-amd64
            mltlint-darwin-amd64
            mltlint-darwin-arm64
